<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Projects - Anurag Video Mixing Zone</title>
</head>
<style>
    *{
        margin:0;
        padding: 0;
        box-sizing: border-box;
    }

    input{
        height: 5vh; width: 60%;
        margin: 2vh;
        background-color: #f1dfd7
        border: none;
    }

    button{
        padding: 2vh;
        width: 25vw;
        background-color: red;
        border: none;
        font-weight: bold;
        color: #fff;
    }

    form{
        max-width: 30%; height:50vh; width: 100%; border:2px solid #00000031; border-radius:2vh;
    }

    @media screen and (max-width: 480px){
        form{
        max-width: 80%; height:50vh; width: 100%; border:2px solid #00000031; border-radius:2vh;
    }
    }

</style>
<body>
    <div style='height:100vh; width: 100%; background: #ff5e54; display:flex; flex-direction:column; justify-content: center; align-items:center;'>
        {{msg}}
        <h1 style=''>Add Projects - Anurag Video Mixing Zone</h1>
        <form style='' method='post' enctype="multipart/form-data">
            {% csrf_token %}
        <label for="">Name:</label>
        <input type="text" name='name' placeholder="Enter Project Name"><br>
        <label for="">Description:</label>
        <input type="text" name='description' placeholder="Write Small Description"><br>
        <label for="">Project Pic:</label>
        <input type="file" name="image" required><br>
        <center><button type="submit">Add</button></center>
    </form>
     <a href="{% url "dashboard" %}"><button style='background: green; margin: 2vh;'>Dashboard</button></a>
    </div>
</body>
</html>
